# netlify.toml — deployment config for warprices site

[build]
  publish = "."        # serve from repo root

# ── Redirects ────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/fuel"
  to   = "/panels/fuel.html"
  status = 200

[[redirects]]
  from = "/food"
  to   = "/panels/food.html"
  status = 200

# ── Security & cache headers ─────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# JSON data files: short cache so panels always get fresh data
[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=600"

# HTML panels: no cache so deploys are instant
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Static assets (fonts, images): long cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
